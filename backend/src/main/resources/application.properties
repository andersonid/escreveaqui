spring.application.name=backend
escreveaqui.public-url=${ESCREVEAQUI_PUBLIC_URL:https://escreveaqui.nobre.ninja}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:escreveaqui}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=EscreveAquiPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

logging.structured.format.console=ecs

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=br.com.escreveaqui.backend.controllers
springdoc.show-actuator=false

# MCP (Model Context Protocol) — tools gerados a partir do OpenAPI
springdoc.ai.mcp.enabled=true
springdoc.ai.mcp.base-url=http://127.0.0.1:8080
springdoc.ai.mcp.mcp-endpoint=/mcp
springdoc.ai.mcp.paths-to-exclude=/api/v1/admin/**,/actuator/**
springdoc.ai.mcp.guardrails.require-approval-for-mutating-tools=true
springdoc.ai.mcp.dashboard-enabled=false
