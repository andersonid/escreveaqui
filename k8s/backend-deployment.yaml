apiVersion: apps/v1
kind: Deployment
metadata:
  name: escreveaqui-backend
  namespace: escreveaqui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escreveaqui-backend
  template:
    metadata:
      labels:
        app: escreveaqui-backend
    spec:
      containers:
        - name: backend
          image: escreveaqui-backend:placeholder
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: escreveaqui-db
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: escreveaqui-db
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: escreveaqui-db
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: escreveaqui-db
                  key: POSTGRES_PASSWORD
            - name: ALLOWED_ORIGINS
              value: https://escreveaqui.nobre.ninja
            - name: S3_ENDPOINT
              value: https://eu2.contabostorage.com
            - name: S3_REGION
              value: eu2
            - name: S3_BUCKET
              value: escreveaqui
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: escreveaqui-s3
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: escreveaqui-s3
                  key: S3_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
