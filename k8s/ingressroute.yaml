apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: escreveaqui
  namespace: escreveaqui
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`escreveaqui.nobre.ninja`) && (PathPrefix(`/v3/api-docs`) || PathPrefix(`/swagger-ui`) || PathPrefix(`/mcp`))
      kind: Rule
      priority: 30
      middlewares:
        - name: api-docs-auth
          namespace: escreveaqui
        - name: security-headers
          namespace: kube-system
        - name: rate-limit
          namespace: kube-system
      services:
        - name: escreveaqui-backend
          port: 8080
    - match: Host(`escreveaqui.nobre.ninja`) && PathPrefix(`/api`)
      kind: Rule
      priority: 20
      middlewares:
        - name: security-headers
          namespace: kube-system
        - name: rate-limit
          namespace: kube-system
      services:
        - name: escreveaqui-backend
          port: 8080
    - match: Host(`escreveaqui.nobre.ninja`)
      kind: Rule
      priority: 10
      middlewares:
        - name: security-headers
          namespace: kube-system
        - name: rate-limit
          namespace: kube-system
      services:
        - name: escreveaqui-frontend
          port: 80
  tls:
    certResolver: letsencrypt
