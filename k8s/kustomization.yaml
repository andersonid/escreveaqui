apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: escreveaqui

resources:
  - namespace.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - postgres-sealed-secret.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - api-docs-auth-middleware.yaml
  - api-docs-auth-sealed-secret.yaml
  - s3-sealed-secret.yaml
  - ingressroute.yaml

images:
  - name: escreveaqui-backend
    newName: registry.registry.svc.cluster.local:5000/nobre-ninja/escreveaqui-backend
    newTag: placeholder
  - name: escreveaqui-frontend
    newName: registry.registry.svc.cluster.local:5000/nobre-ninja/escreveaqui-frontend
    newTag: placeholder
